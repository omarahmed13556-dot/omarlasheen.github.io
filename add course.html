<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Add Courses Page</title>
        <meta charset="UTF-8">
        <meta name="description" content="Add new courses to your organizer">
        <link rel="stylesheet" href="stylishh.css">
    </head>
    <body>
        <header class="hhh1">
            <h1 style="color: honeydew;">Add Your Courses</h1>

        </header>
        <hr>

        <main>
            <section class="add-course-section">
                <h3 class="hhh">Add a New Course</h3>
                <form class="addcourseform">
                    <label for="course-name">Course Name:</label>
                    <input type="text" id="course-name" name="course-name" placeholder="Please enter the course name" required>
                    <label for="credit hours">credit hours :</label>
                    <input type="number" id="credit-hours" name="credit-hours " placeholder="please enter the credit hours" required>
                    <label for="teacher-name"> teacher name </label>
                    <input type="text" id="teacher-name" name="teacher-name" placeholder="please enter the teacher name" required>
                    <input type="submit" value="Add Course" class="buttonn">
                </form>
            </section>
        </main>

        <footer>

            <a href="index.html">HOME</a>
            <a href="contactus.html">CONTACT US</a>
            <a href="mycourses.html">MY COURSES</a>
        </footer>
    </body>
</html>
