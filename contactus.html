<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Contact Us</title>
        <meta charset="UTF-8">
        <meta name="description" content="Contact us for any questions or support">
        <link rel="stylesheet" href="stylishh.css">
    </head>
    <body>
        <header class="hhh1">
            <h1 style="color: honeydew;">Contact Us</h1>
        </header>
        <hr>
        <main>
            <section class="contact-info">
                <div class="contact-cards">
                    <div class="contact-card">
                        <h4> Call Us</h4>
                        <p class="contact-detail">If anything happens, please contact us at:</p>
                        <p class="phone-number">19999</p>
                    </div>
                    <div class="contact-card">
                        <h4> Email Us</h4>
                        <p class="contact-detail">Send us an email :</p>
                        <a href="mailto:omarahmed13556@gmail.com" class="email-link">omarahmed13556@gmail.com</a>
                    </div>
                </div>
            </section>

            <section class="contact-form-section">
                <h3 class="hhh">Or Fill This Form</h3>
                <form class="contact-form">
                    <label for="name">Your Name:</label>
                    <input type="text" id="name" name="name" placeholder="Enter your full name" required>

                    <label for="message">What's Happening:</label>
                    <textarea id="message" name="message" placeholder="Describe your problem or question" required></textarea>

                    <label for="phone">Your Phone Number:</label>
                    <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>

                    <input type="submit" value="Send Message" class="buttonn">
                </form>
            </section>
        </main>

        <footer>
            <h3>&copy; 2026 orgcoursers</h3>

            <a href="contactus.html">CONTACT US</a>
            <a href="mycourses.html">MY COURSES</a>
            <a href="add course.html">ADD COURSES</a>
        </footer>
    </body>
</html>
